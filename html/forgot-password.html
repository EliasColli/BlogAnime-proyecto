<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CURATOR | Recovery</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint": "#ffb2b7",
                        "primary": "#ffb2b7",
                        "secondary-container": "#00a6e0",
                        "inverse-surface": "#dae2fd",
                        "on-tertiary-fixed-variant": "#5516be",
                        "secondary-fixed-dim": "#7bd0ff",
                        "outline": "#aa888a",
                        "on-error-container": "#ffdad6",
                        "on-secondary-container": "#00374d",
                        "primary-container": "#ff516a",
                        "outline-variant": "#5b4041",
                        "surface": "#0b1326",
                        "error-container": "#93000a",
                        "on-error": "#690005",
                        "secondary": "#7bd0ff",
                        "on-tertiary-container": "#340080",
                        "surface-bright": "#31394d",
                        "tertiary-fixed": "#e9ddff",
                        "surface-container-low": "#131b2e",
                        "on-tertiary": "#3c0091",
                        "surface-dim": "#0b1326",
                        "on-secondary": "#00354a",
                        "secondary-fixed": "#c4e7ff",
                        "on-primary-fixed": "#40000d",
                        "background": "#0b1326",
                        "surface-variant": "#2d3449",
                        "tertiary-container": "#a078ff",
                        "primary-fixed": "#ffdadb",
                        "on-background": "#dae2fd",
                        "on-primary-fixed-variant": "#92002a",
                        "error": "#ffb4ab",
                        "primary-fixed-dim": "#ffb2b7",
                        "surface-container": "#171f33",
                        "on-secondary-fixed": "#001e2c",
                        "surface-container-highest": "#2d3449",
                        "tertiary": "#d0bcff",
                        "on-primary": "#67001b",
                        "on-surface": "#dae2fd",
                        "inverse-on-surface": "#283044",
                        "tertiary-fixed-dim": "#d0bcff",
                        "on-primary-container": "#5b0017",
                        "surface-container-high": "#222a3d",
                        "on-tertiary-fixed": "#23005c",
                        "on-surface-variant": "#e3bdbf",
                        "on-secondary-fixed-variant": "#004c69",
                        "inverse-primary": "#bc0b3b",
                        "surface-container-lowest": "#060e20"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .editorial-gradient {
            background: linear-gradient(135deg, #ffb2b7 0%, #ff516a 100%);
        }

        .glass-panel {
            background: rgba(45, 52, 73, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>

    <!-- Requisitos Acad�micos: Bootstrap & jQuery -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>

<body class="bg-surface text-on-surface font-body selection:bg-primary/30">
    <main class="min-h-screen w-full flex overflow-hidden">
        <!-- Left Side: Cinematic Illustration -->
        <section class="hidden lg:flex lg:w-3/5 xl:w-2/3 relative items-center justify-center p-12 overflow-hidden">
            <!-- Background Image with Tonal Overlay -->
            <div class="absolute inset-0 z-0">
                <img alt="Ethereal anime landscape" class="w-full h-full object-cover"
                    data-alt="Cinematic high-contrast artistic anime character illustration"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUlTqbNIloEHS87RpYo6Vhx5V_nJNqtsQbOHhTDLRLR3RwdyKTjD_0I_tFartRUkk3t7R3vpXF5eYNtNDznuUK1yqQMNmnDjh9PYW-OblN4sCm2pImSakmijGAdTq30MUJgiMCYT9XWabtwiW8CLGuydhibeo3pQYzUlxVNmYRpflr2bfP0vVmClhmEhz8AGYtPAZeaqGLIEjy1HlP57jbjT9yNtz5O2fcMvUkxa-3dsLn2JqD5IS7LxTuHMKKTw1dGOUH0egt1g" />
                <div class="absolute inset-0 bg-gradient-to-tr from-surface via-surface/40 to-transparent"></div>
            </div>
            <!-- Glassmorphism Branding Overlay -->
            <div class="relative z-10 glass-panel p-12 lg:p-16 rounded-xl max-w-2xl border border-white/5 shadow-2xl">
                <div class="mb-10">
                    <h1 class="font-headline text-5xl font-black tracking-tighter text-white mb-2">CURATOR</h1>
                    <div class="h-1 w-24 editorial-gradient"></div>
                </div>
                <blockquote class="space-y-6">
                    <p class="font-headline text-3xl font-light leading-tight tracking-tight text-white/90">
                        "EVERY FRAME IS A STORY, EVERY PIXEL A PIECE OF ART. WELCOME BACK TO THE DIGITAL ARCHIVE."
                    </p>
                    <footer class="flex items-center gap-4">
                        <div class="h-px w-8 bg-secondary"></div>
                        <span class="font-label text-xs tracking-widest uppercase text-secondary">Issue #84: The
                            Renaissance</span>
                    </footer>
                </blockquote>
            </div>
            <!-- Floating Decorative Element -->
            <div class="absolute bottom-12 right-12 z-10 flex flex-col items-end opacity-40">
                <span class="font-headline text-9xl font-black text-white/5 select-none leading-none">01</span>
                <span
                    class="font-label text-[0.6rem] tracking-[0.4em] uppercase text-white/40 rotate-90 origin-right translate-y-8">Authentication
                    Sequence</span>
            </div>
        </section>
        <!-- Right Side: Clean Editorial Form -->
        <section
            class="w-full lg:w-2/5 xl:w-1/3 bg-surface flex flex-col justify-center px-8 sm:px-16 lg:px-12 xl:px-20 relative border-l border-white/5">
            <div class="w-full max-w-md mx-auto space-y-12">
                <!-- Mobile Logo -->
                <div class="lg:hidden mb-12">
                    <h1 class="font-headline text-3xl font-black tracking-tighter text-white">CURATOR</h1>
                </div>
                <div class="space-y-2">
                    <h2 class="font-headline text-4xl font-bold tracking-tight text-on-surface">Recover Access</h2>
                    <p class="text-on-surface-variant font-light">Enter your digital identity to receive a reset token.</p>
                </div>
                <!-- Form -->
                <form id="recoverForm" class="space-y-8">
                    <div class="space-y-6">
                        <!-- Email Field -->
                        <div class="space-y-2 group">
                            <label
                                class="font-label text-[0.65rem] tracking-widest uppercase text-on-surface-variant group-focus-within:text-secondary transition-colors"
                                for="email">Digital Identity</label>
                            <input
                                class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant focus:border-secondary focus:ring-0 text-on-surface placeholder:text-outline-variant/50 transition-all py-3 px-0"
                                id="email" placeholder="email@example.com" type="email" required />
                        </div>
                    </div>
                    <!-- Primary Action -->
                    <button
                        class="w-full editorial-gradient py-4 rounded-lg font-headline font-bold uppercase tracking-widest text-on-primary text-sm shadow-lg shadow-primary-container/20 hover:scale-[1.02] active:scale-95 transition-all duration-300"
                        type="submit">
                        <span>Send Token</span>
                    </button>
                </form>

                <!-- Footer Text -->
                <div class="pt-8 text-center">
                    <p class="font-label text-[0.65rem] text-outline-variant tracking-widest uppercase">
                        Remembered? <a class="text-secondary hover:underline underline-offset-4 ml-2" href="login.html">Sign In</a>
                    </p>
                </div>
            </div>
            <!-- Bottom Floating Decor -->
            <div class="absolute bottom-8 left-0 right-0 flex justify-center opacity-10 pointer-events-none">
                <span class="font-headline text-[10rem] font-black tracking-tighter leading-none">RECOVERY</span>
            </div>
        </section>
    </main>
    <!-- Global Footer Suppression (Transactional Page) -->
    <!-- As per hierarchy: Suppression for Transactional Screens -->
    <script src="script.js"></script>
</body>

</html>
