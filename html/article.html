<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CURATOR | Article</title>
    <!-- Requisitos Académicos: Bootstrap & jQuery -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffb2b7",
                        "secondary": "#7bd0ff",
                        "outline-variant": "#5b4041",
                        "surface": "#0b1326",
                        "surface-container-low": "#131b2e",
                        "on-surface": "#dae2fd",
                        "surface-container-highest": "#2d3449"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .editorial-gradient { background: linear-gradient(135deg, #ffb2b7 0%, #ff516a 100%); }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col">
    <!-- Navbar Minimalista -->
    <nav class="px-12 py-6 border-b border-white/5 flex justify-between items-center bg-surface top-0 z-50">
        <a href="index.html" class="font-headline text-2xl font-black tracking-tighter text-white hover:text-primary transition-colors">CURATOR</a>
        <a href="index.html" class="flex items-center gap-2 text-sm text-slate-400 hover:text-white transition-colors">
            <span class="material-symbols-outlined text-lg">arrow_back</span>
            Back to Home
        </a>
    </nav>
    
    <main class="flex-grow w-full max-w-4xl mx-auto px-8 py-16">
        <div class="space-y-12">
            <!-- Article Header -->
            <header class="space-y-6">
                <div class="h-1 w-24 editorial-gradient"></div>
                <h1 id="article-title" class="font-headline text-5xl md:text-6xl font-black tracking-tighter text-white leading-tight">Loading Article...</h1>
                <p id="article-author" class="font-label text-sm tracking-widest uppercase text-secondary">Author</p>
            </header>

            <!-- Article Content -->
            <article class="bg-surface-container-low p-12 rounded-2xl border border-white/5 shadow-2xl">
                <p id="article-content" class="text-lg text-slate-300 font-light leading-relaxed whitespace-pre-wrap">Please wait while the digital archive is retrieved...</p>
            </article>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
